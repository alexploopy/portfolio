name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Default suits a PROJECT repo, served at username.github.io/<repo-name>/
          # (e.g. this template's demo at /portfolio/). For a USER site
          # (username.github.io) or a CUSTOM DOMAIN, set PATH_PREFIX: "/" instead.
          PATH_PREFIX: "/${{ github.event.repository.name }}/"
      # Requires Pages to be enabled once: Settings -> Pages -> Source: GitHub
      # Actions. (We don't auto-enable here — the workflow token can't reliably
      # create the Pages site, which fails the run.)
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
